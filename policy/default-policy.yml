version: 1

actions:
  secrets: redact
  pii_customer: redact
  pii_internal: alert
  internal_hostnames: redact

detection:
  gitleaks: true
  presidio: false
  fast_pii_regex: true
  # Largest file safe_read will pull fully into memory. Files larger than
  # this are scanned via the streaming chunked path and return a detection
  # summary instead of redacted content. Use safe_read with byteRange to
  # fetch a slice of a large file.
  max_bytes: 10000000
  # Streaming chunk size and overlap. The overlap caps the longest single
  # span the streaming path can reliably detect (default 16 KB covers PEM
  # blocks and JWTs).
  chunk_bytes: 1048576
  chunk_overlap: 16384
  # Entropy thresholds. generic_credential gates the catchall
  # `password = ...` / `api_key = ...` rule on top of the placeholder
  # denylist and value-shape filters. Lower = more recall, more FPs.
  entropy:
    generic_credential: 2.7

tune:
  env_keys_from: [".env.example"]
  internal_domains: []
  custom_patterns: []

fail_closed: true

allow:
  - "AKIAIOSFODNN7EXAMPLE"

vault:
  max_entries: 10000
  wipe_on_stop: true
